name: editorial-staging

services:
  db:
    image: postgres:16-alpine
    container_name: editorial-staging-db
    restart: always
    environment:
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD}
      POSTGRES_DB: ${PGDATABASE:-editorial_db}
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=\"$${POSTGRES_PASSWORD}\" psql --host 127.0.0.1 --username \"$${POSTGRES_USER}\" --dbname \"$${POSTGRES_DB}\" --command 'SELECT 1' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - pg-staging-data:/var/lib/postgresql/data
    networks:
      - editorial-staging-internal
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  app:
    container_name: editorial-staging-app
    build:
      context: .
      dockerfile: Dockerfile
    image: editorial-platform:staging
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: staging
      PORT: "3000"
      POSTGRES_REQUIRED: "true"
      PGHOST: ${PGHOST:-db}
      PGPORT: ${PGPORT:-5432}
      PGDATABASE: ${PGDATABASE:-editorial_db}
      PGUSER: ${PGUSER:-postgres}
      PGPASSWORD: ${PGPASSWORD}
    env_file:
      - /etc/editorial-platform/staging.env
    expose:
      - "3000"
    volumes:
      - app-staging-data:/app/data
    networks:
      - editorial-staging-internal
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  proxy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "127.0.0.1:8080:80"
      - "127.0.0.1:8443:443"
    volumes:
      - /etc/editorial-platform/Caddyfile.staging:/etc/caddy/Caddyfile:ro
      - caddy-staging-data:/data
      - caddy-staging-config:/config
    networks:
      - editorial-staging-internal
      - editorial-staging-proxy
    depends_on:
      - app
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

networks:
  editorial-staging-internal:
    driver: bridge
  editorial-staging-proxy:
    driver: bridge

volumes:
  app-staging-data:
  pg-staging-data:
  caddy-staging-data:
  caddy-staging-config:
