name: Continuous Integration

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: editorial_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci-postgres-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d editorial_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-cache: 'npm'
          node-version: 20

      - name: Locked Dependency Installation
        run: npm ci

      - name: TypeScript Type Safety Checks
        run: npx tsc --noEmit

      - name: ESLint Code Quality Verification
        run: npm run lint

      - name: Run ShellCheck on Installer Script
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: 'deployment'
          severity: warning

      - name: Run Complete Test Suite
        run: npx vitest run
        env:
          NODE_ENV: test
          VITEST: true
          TEST_POSTGRES: true
          PGHOST: 127.0.0.1
          PGPORT: 5432
          PGDATABASE: editorial_db
          PGUSER: postgres
          PGPASSWORD: ci-postgres-password
