name: editorial-production

services:
  db:
    image: postgres:16-alpine
    container_name: editorial-production-db
    restart: always
    environment:
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD}
      POSTGRES_DB: ${PGDATABASE:-editorial_db}
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=\"$${POSTGRES_PASSWORD}\" psql --host 127.0.0.1 --username \"$${POSTGRES_USER}\" --dbname \"$${POSTGRES_DB}\" --command 'SELECT 1' >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - editorial-production-internal
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  app:
    container_name: editorial-production-app
    build:
      context: .
      dockerfile: Dockerfile
    image: editorial-platform:production
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3000"
      POSTGRES_REQUIRED: "true"
      PGHOST: ${PGHOST:-db}
      PGPORT: ${PGPORT:-5432}
      PGDATABASE: ${PGDATABASE:-editorial_db}
      PGUSER: ${PGUSER:-postgres}
      PGPASSWORD: ${PGPASSWORD}
    env_file:
      - /etc/editorial-platform/production.env
    expose:
      - "3000"
    volumes:
      - app-data:/app/data
    networks:
      - editorial-production-internal
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2048M
        reservations:
          cpus: '0.2'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  proxy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/editorial-platform/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - editorial-production-internal
      - editorial-production-proxy
    depends_on:
      - app
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

networks:
  editorial-production-internal:
    driver: bridge
  editorial-production-proxy:
    driver: bridge

volumes:
  app-data:
  pg-data:
  caddy-data:
  caddy-config:
